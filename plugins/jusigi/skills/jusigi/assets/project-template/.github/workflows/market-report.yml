name: Market report

on:
  schedule:
    # UTC; default corresponds to 09:05, 12:05, 16:05 Asia/Seoul weekdays.
    - cron: "__JUSIGI_REPORT_CRON__"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jusigi-market-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Generate report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: PYTHONPATH=src python -m jusigi.main report
